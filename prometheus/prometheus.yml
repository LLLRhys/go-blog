global:
  scrape_interval: 15s      # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔（告警规则用）
  scrape_timeout: 10s       # 抓取超时

scrape_configs:
  # Go 博客后端 — /metrics 端点
  - job_name: 'go-blog-backend'
    metrics_path: /metrics
    static_configs:
      # - targets: ['backend:8080']
      - targets: ['localhost:8080']
        labels:
          service: go-blog-backend
